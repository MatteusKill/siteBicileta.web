<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIKE 544</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body class="login">
    <div class="area-login">
        <div class="area-login-foto">
            <img src="../IMG/LOGO 2.avif" alt="Foto imagem login">
        </div>
        <div class="area-login-form">
            <form action="">
                <p class="title-login">LOGIN</p>
                <div class="inputs-login">
                    <label for="usuario" class="label-login">Usuário</label>
                    <input type="text" name="usuario" id="usuario" class="input-login">
                </div>
                <div class="area-inputs-login">
                    <label for="senha" class="label-login">Senha</label>
                    <input type="text" name="senha" id="senha" class="input-login">
                </div>
                <div class="area-itens-login">
                    <div class="area-conectado">
                        <input type="checkbox" name="conectado" id="conectado">
                        <label for="conectado">Manter conectado</label>
                    </div>
                    <p>Esqueci Minha <a href="">Senha</a></p>
                </div>
                <button type="submit" class="btn-login">LOGAR</button>
                <div class="area-itens-login">
                    <p>Não possui conta? <a href="cadastro.html">Cadastre-se</a></p>
                </div>
                <div class="area-logar-icons">
                    <p>Logar com </p>
                    <div class="area-icons-login">
                    <!-- COLOCAR IMAGEM -->
                        <a href=""><i><img src="../IMG/credit-card-solid-full.svg" alt=""></i></a>
                        <a href=""><i><img src="../IMG/facebook-brands-solid-full.svg" alt=""></i></a>
                        <a href=""><i><img src="../IMG/google-brands-solid-full.svg" alt=""></i></a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
