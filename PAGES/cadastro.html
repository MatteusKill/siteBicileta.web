    </header>
    
    <div class="box-cadastro">
        <form action="">
            <fieldset>
                <legend><span> Formulário de Clientes</span></legend>
                <div class="input-box">
                    <input type="text" name="nome" id="nome" class="inputUser" required>
                    <label for="nome" class="labelInput">Nome completo:</label>
                </div>
                <div class="input-box">
                    <input type="text" name="email" id="email" class="inputUser" required>
                    <label for="email" class="labelInput">Email:</label>
                </div>
                <div class="input-box">
                    <input type="tel" name="tel" id="tel" class="inputUser" required>
                    <label for="tel" class="labelInput">Telefone:</label>
                </div>
                <div class="genero">
                    <p>Sexo:</p>
                    <div class="opcao-genero">
                        <input type="radio" name="genero" id="feminino" value="feminino" required>
                        <label for="feminino">Feminino</label>
                    </div>
                    <div class="opcao-genero">
                        <input type="radio" name="genero" id="Masculino" value="Masculino" required>
                        <label for="Masculino">Masculino</label>
                    </div>
                    <div class="opcao-genero">
                        <input type="radio" name="genero" id="Outros" value="Outros" required>
                        <label for="Outros">Outros</label>
                    </div>
                </div>
                <div class="data-nascimento">
                    <label for="data_nascimento">Data de Nascimento:</label>
                    <input type="date" name="data_nascimento" id="data_nascimento" required>
                </div>
                <div class="input-box">
                    <input type="text" name="cidade" Cd="cidade" Class="inputUser" required>
                    <label for="cidade" class="labelInput">Cidade:</label>
                </div>
                <div class="input-box">
                    <input type="text" name="Estado" Cd="Estado" Class="inputUser" required>
                    <label for="Estado" class="labelInput">Estado:</label>
                </div>
                <div class="input-box">
                    <input type="text" name="endereco" Cd="endereco" Class="inputUser" required>
                    <label for="endereco" class="labelInput">Endereço:</label>
                </div>
                <input type="button" value="ENVIAR" name="submit" id="submit">
            </fieldset>
        </form>
